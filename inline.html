<!DOCTYPE html>
<html>
<head>
    <title>CSS Selectors Demo</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        h2 {
            color: blue;
            text-align: center;
        }

        p {
            font-size: 18px;
            color: green;
        }
    </style>

</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color:red; text-align:center;">
        Welcome to CSS
    </h1>

    <h2>Internal CSS Example</h2>

    <p>
        This paragraph is styled using Internal CSS.
    </p>

    <h3 class="external">
        This heading is styled using External CSS.
    </h3>

</body>
</html>
